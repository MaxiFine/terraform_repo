####################################################################################################
## NEW CONFIGS FOR CLARITY AND REUSABILITY
####################################################################################################
name: Terraform CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform Pipeline
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    env:
      AWS_REGION: us-east-1
      TF_S3_BUCKET: ${{ secrets.TF_S3_BUCKET }}
      TF_DYNAMO_DB_TABLE: ${{ secrets.TF_DYNAMO_DB_TABLE }}

    defaults:
      run:
        working-directory: ./lab-work-2

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=$TF_S3_BUCKET" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_DYNAMO_DB_TABLE"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ./lab-work-2/tfplan

          